services:
  alpha-scraper-dashboard:
    build: .
    container_name: alpha-scraper-dashboard
    volumes:
      - ./app:/app
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - APIFY_FACEBOOK_API_KEY=${APIFY_FACEBOOK_API_KEY}
      - APIFY_INSTAGRAM_API_KEY=${APIFY_INSTAGRAM_API_KEY}
      - TWITTER_X_API_KEY=${TWITTER_X_API_KEY}
      - TIKAPI_API_KEY=${TIKAPI_API_KEY}
      - YOUTUBE_API_KEY=${YOUTUBE_API_KEY}
    restart: always